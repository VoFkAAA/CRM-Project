<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создаём клиента</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="light-theme">
    <div class="theme-toggle">
        <button id="themeSwitcher" class="theme-btn">🌙 Тёмная тема</button>
    </div>

    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <!-- БАГ: Заголовок должен быть "Новый клиент", но по багу "Создаём клиента" -->
                <h1>Создаём клиента</h1>
                <button class="close-btn" onclick="window.location.href='/clients_page'">&times;</button>
            </div>

            <div class="error-message" id="errorMessage" style="display: none;"></div>
            <div class="success-message" id="successMessage" style="display: none;"></div>

            <form id="createClientForm">
                <div class="form-group">
                    <label for="client_name">Клиент *</label>
                    <input type="text" id="client_name" name="client_name"
                        placeholder="Введите название компании или имя" required>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="user@mail.ru" required>
                </div>

                <div class="form-group">
                    <label for="phone">Телефон *</label>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <span class="phone-prefix"
                            style="background: #f0f0f0; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">+7</span>
                        <input type="tel" id="phone" name="phone" placeholder="(XXX) XXX-XX-XX" required
                            style="flex: 1;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Адрес</label>
                    <!-- БАГ: поле "Адрес" вводимые символы отображаются как "___________________" -->
                    <input type="text" id="address" name="address" placeholder="Москва, ул. Новая, д. 1, корп. 1">
                </div>

                <div class="form-group">
                    <label for="status">Статус</label>
                    <select id="status" name="status">
                        <option value="" selected disabled>— Не выбрано —</option>
                        <option value="Active">Active - активное сотрудничество</option>
                        <option value="Stopped">Stopped - сотрудничество закончено</option>
                        <option value="Blocked">Blocked - клиент заблокирован</option>
                    </select>
                </div>

                <div class="form-actions">
                    <!-- БАГ: кнопка "Отмена" не работает (ошибка в консоли) -->
                    <button type="submit" class="btn-primary">ОК</button>
                    <button type="button" id="cancelBtn" class="btn-secondary">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-left">
            © My Own Project, 2026
        </div>
        <div class="footer-right">
            <a href="#" id="privacyPolicyLink" class="footer-link">Политика конфиденциальности</a>
            <a href="#" id="termsOfUseLink" class="footer-link">Условия использования</a>
            <!-- БАГ: опечатка в телефоне 80012223??? -->
            <div class="contacts">
                Тел.: 80012223344<br>
                Эл. почта: unexistingtestmail@ya.ru
            </div>
        </div>
    </footer>

    <script>
        // Загрузка сохранённой темы
        const savedTheme = localStorage.getItem('theme');
        let isDark = savedTheme === 'dark';

        if (isDark) {
            document.body.classList.add('dark-theme');
            document.body.classList.remove('light-theme');
        } else {
            document.body.classList.add('light-theme');
            document.body.classList.remove('dark-theme');
        }

        // Обновляем текст кнопки
        const themeSwitcher = document.getElementById('themeSwitcher');
        if (themeSwitcher) {
            themeSwitcher.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
        }

        const API_BASE = window.location.origin;
        const token = localStorage.getItem('access_token');

        if (!token) {
            window.location.href = '/';
        }

        themeSwitcher.addEventListener('click', () => {
            isDark = !isDark;
            document.body.className = isDark ? 'dark-theme' : 'light-theme';
            themeSwitcher.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');  // ← ДОБАВИТЬ ЭТУ СТРОКУ
        });

        // Форматирование телефона (маска ввода) с фиксированным +7
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 10) value = value.slice(0, 10);

            let formatted = '';
            for (let i = 0; i < value.length; i++) {
                if (i === 0) formatted += '(';
                formatted += value[i];
                if (i === 2) formatted += ') ';
                if (i === 5) formatted += '-';
                if (i === 7) formatted += '-';
            }
            e.target.value = formatted;
        });

        // БАГ: поле "Адрес" - вводимые символы отображаются как нижнее подчеркивание
        const addressInput = document.getElementById('address');
        addressInput.addEventListener('input', (e) => {
            // БАГ: заменяем все символы на нижнее подчеркивание
            const originalValue = e.target.value;
            const bugValue = originalValue.replace(/[^\s]/g, '_');
            if (e.target.value !== bugValue) {
                e.target.value = bugValue;
            }
        });

        // Форма создания клиента
        document.getElementById('createClientForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const client_name = document.getElementById('client_name').value.trim();
            const email = document.getElementById('email').value.trim();
            let phone = document.getElementById('phone').value.replace(/\D/g, '');
            const address = document.getElementById('address').value;
            const status = document.getElementById('status').value;

            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Валидация
            if (!client_name || client_name.length < 4) {
                errorDiv.textContent = 'Название клиента должно содержать минимум 4 символа';
                errorDiv.style.display = 'block';
                return;
            }

            if (phone.length !== 10) {
                errorDiv.textContent = 'Введите корректный телефон (10 цифр)';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/create_client`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ client_name, email, phone, address, status })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    successDiv.textContent = 'Клиент успешно создан!';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/clients_page';
                    }, 1000);
                } else {
                    errorDiv.textContent = data.message || 'Ошибка создания клиента';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Ошибка сети';
                errorDiv.style.display = 'block';
            }
        });

        // БАГ: кнопка Отмена не работает + ошибка в консоли
        document.getElementById('cancelBtn').addEventListener('click', () => {
            // БАГ: не возвращает на предыдущую страницу
            console.error('Ошибка: функция отмены не реализована');
            // Также не закрывает форму
        });

        // Футер ссылки
        document.getElementById('privacyPolicyLink').onclick = (e) => {
            e.preventDefault();
            alert('Политика конфиденциальности.\n\n1. ÐŸÐ¾Ð»Ð¸Ñ‚Ð¸ÐºÐ° ÐºÐ¾Ð½Ñ„Ð¸Ð´ÐµÐ½Ñ†Ð¸Ð°Ð»ÑŒÐ½Ð¾ÑÑ‚ÐÐŸÐ¾Ð»Ð¸Ñ‚Ð¸ÐºÐ° ÐºÐ¾Ð½Ñ„Ð¸Ð´ÐµÐ½Ñ†Ð¸Ð°Ð»ÑŒ  \n\n2.Ð½Ð¾ÑÑ‚ÐÐŸÐ¾Ð»Ð¸Ñ‚Ð¸ÐºÐ° ÐºÐ¾Ð½Ñ„Ð¸Ð´ÐµÐ½Ñ†Ð¸Ð°Ð»ÑŒÐ½Ð¾ÑÑ‚ÐÐŸÐ¾Ð»Ð¸Ñ‚Ð¸ÐºÐ° ÐºÐ¾Ð½Ñ„Ð¸Ð´ÐµÐ½Ñ†Ð¸Ð°Ð»ÑŒÐ½Ð¾ÑÑ‚ÐÐŸÐ¾Ð»Ð¸Ñ‚Ð¸ÐºÐ° ÐºÐ¾Ð½Ñ„Ð¸Ð´ÐµÐ½Ñ†Ð¸Ð°Ð»Ñ \n\n3.ŒÐ½Ð¾ÑÑ‚ÐÐŸÐ¾Ð»Ð¸Ñ‚Ð¸ÐºÐ° ÐºÐ¾Ð½Ñ„Ð¸Ð´ÐµÐ½Ñ†Ð¸Ð°Ð»ÑŒÐ½Ð¾ÑÑ‚Ð');
        };
        document.getElementById('termsOfUseLink').onclick = (e) => {
            e.preventDefault();
            alert('Условия использования \n\n1. Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industrys standard dummy text ever since the 1500s, when an unknown printer took a galley of type and scrambled it to make a type specimen book. It has survived not only five centuries, but also the leap into electronic typesetting, remaining essentially unchanged.\n\n2. Contrary to popular belief, Lorem Ipsum is not simply random text. It has roots in a piece of classical Latin literature from 45 BC, making it over 2000 years old. Richard McClintock, a Latin professor at Hampden-Sydney College in Virginia, looked up one of the more obscure Latin words, consectetur, from a Lorem Ipsum passage.\n\n3. There are many variations of passages of Lorem Ipsum available, but the majority have suffered alteration in some form, by injected humour, or randomised words which dont look even slightly believable.');
        };
    </script>
</body>
