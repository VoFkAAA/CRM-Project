<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная - Мои клиенты</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="light-theme">
    <div class="theme-toggle">
        <button id="themeSwitcher" class="theme-btn">🌙 Тёмная тема</button>
    </div>

    <!-- БАГ: Кнопка переключения темы должна быть в верхнем правом углу, но будет в нижнем левом (по багу) -->

    <div class="main-container">
        <header class="main-header">
            <h1>Мои клиенты</h1>
            <button id="profileBtn" class="profile-btn">👤 Профиль</button>
        </header>

        <div class="clients-controls">
            <button id="createClientBtn" class="btn-primary">+ Создать клиента</button>
        </div>

        <div class="error-message" id="errorMessage" style="display: none;"></div>

        <div class="clients-table-container">
            <table class="clients-table" id="clientsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Email</th>
                        <th>Телефон</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="clientsTableBody">
                    <tr>
                        <td colspan="6" class="loading">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-left">
            © My Own Project, 2026
        </div>
        <div class="footer-right">
            <a href="#" id="privacyPolicyLink" class="footer-link">Политика конфиденциальности</a>
            <a href="#" id="termsOfUseLink" class="footer-link">Условия использования</a>
            <div class="contacts">
                Тел.: 84952223???<br>
                Эл. почта: unexistingtestmail@ya.ru
            </div>
        </div>
    </footer>

    <!-- Модальное окно для деталей клиента -->
    <div id="clientModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Информация о клиенте</h3>
                <span class="close">&times;</span>
            </div>
            <div id="clientDetails"></div>
        </div>
    </div>

    <!-- Модальное окно подтверждения удаления -->
    <div id="deleteModal" class="modal" style="display: none;">
        <div class="modal-content">
            <p>Вы действительно хотите удалить клиента?</p>
            <div class="modal-buttons">
                <button id="confirmDeleteBtn" class="btn-danger">Да</button>
                <button id="cancelDeleteBtn" class="btn-secondary">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://crm-project-yc8x.onrender.com';
        let currentUserId = null;
        let clientsList = [];
        let clientToDelete = null;

        // Проверка авторизации
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = '/';
        }

        // Переключение темы
        const themeSwitcher = document.getElementById('themeSwitcher');
        let isDark = false;

        themeSwitcher.addEventListener('click', () => {
            isDark = !isDark;
            document.body.className = isDark ? 'dark-theme' : 'light-theme';
            themeSwitcher.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
        });

        // Функция для защиты от XSS (экранирование спецсимволов)
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Загрузка списка клиентов
        // Загрузка списка клиентов
        async function loadClients() {
            try {
                const response = await fetch(`${API_BASE}/clients`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                console.log("Ответ сервера:", data);  // ← добавили для отладки

                // Проверяем, что ответ успешный и data.data существует
                if (data.success && Array.isArray(data.data)) {
                    const clients = data.data;
                    const tbody = document.getElementById('clientsTableBody');

                    if (clients.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="loading">✨ Нет клиентов. Создайте первого!</td></tr>';
                        return;
                    }

                    tbody.innerHTML = clients.map(client => `
                <tr>
                    <td>${client.client_id}</td>
                    <td>${escapeHtml(client.client_name)}</td>
                    <td>${escapeHtml(client.email)}</td>
                    <td>${escapeHtml(client.phone)}</td>
                    <td>${client.status || 'Active'}</td>
                    <td>
                        <button class="btn-edit" data-id="${client.client_id}">✏️</button>
                        <button class="btn-delete" data-id="${client.client_id}">🗑️</button>
                    </td>
                </tr>
            `).join('');

                    // Добавляем обработчики на кнопки
                    document.querySelectorAll('.btn-edit').forEach(btn => {
                        btn.addEventListener('click', () => editClient(btn.dataset.id));
                    });
                    document.querySelectorAll('.btn-delete').forEach(btn => {
                        btn.addEventListener('click', () => deleteClient(btn.dataset.id));
                    });
                } else {
                    // Если структура ответа не совпадает
                    console.error("Неожиданный формат ответа:", data);
                    throw new Error(data.message || 'Ошибка загрузки');
                }
            } catch (err) {
                console.error('Ошибка загрузки клиентов:', err);
                const tbody = document.getElementById('clientsTableBody');
                tbody.innerHTML = `<tr><td colspan="6" class="loading">❌ Ошибка загрузки: ${err.message}</td></tr>`;
            }
        }

        // Редактирование клиента (временная заглушка)
        function editClient(id) {
            console.log('Редактирование клиента:', id);
            alert(`Редактирование клиента ${id} будет доступно позже`);
        }

        // Удаление клиента (временная заглушка)
        function deleteClient(id) {
            console.log('Удаление клиента:', id);
            alert(`Удаление клиента ${id} будет доступно позже`);
        }

        // Профиль
        document.getElementById('profileBtn').addEventListener('click', () => {
            window.location.href = '/profile_page';
        });

        // Создать клиента
        document.getElementById('createClientBtn').addEventListener('click', () => {
            window.location.href = '/create_client_page';
        });

        // Модальные окна
        const modal = document.getElementById('clientModal');
        const deleteModal = document.getElementById('deleteModal');
        const closeBtns = document.querySelectorAll('.close');

        closeBtns.forEach(btn => {
            btn.onclick = () => {
                modal.style.display = 'none';
                deleteModal.style.display = 'none';
            };
        });

        window.onclick = (e) => {
            if (e.target === modal) modal.style.display = 'none';
            if (e.target === deleteModal) deleteModal.style.display = 'none';
        };

        document.getElementById('cancelDeleteBtn')?.addEventListener('click', () => {
            deleteModal.style.display = 'none';
            clientToDelete = null;
        });

        // Футер ссылки
        document.getElementById('privacyPolicyLink').onclick = (e) => {
            e.preventDefault();
            alert(`Политика конфиденциальности\n\n1. Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since the 1500s, when an unknown printer took a galley of type and scrambled it to make a type specimen book. It has survived not only five centuries, but also the leap into electronic typesetting, remaining essentially unchanged. It was popularised in the 1960s with the release of Letraset sheets containing Lorem Ipsum passages, and more recently with desktop publishing software like Aldus PageMaker including versions of Lorem Ipsum.\n\n2. Contrary to popular belief, Lorem Ipsum is not simply random text. It has roots in a piece of classical Latin literature from 45 BC, making it over 2000 years old. Richard McClintock, a Latin professor at Hampden-Sydney College in Virginia, looked up one of the more obscure Latin words, consectetur, from a Lorem Ipsum passage, and going through the cites of the word in classical literature, discovered the undoubtable source. Lorem Ipsum comes from sections 1.10.32 and 1.10.33 of "de Finibus Bonorum et Malorum" (The Extremes of Good and Evil) by Cicero, written in 45 BC. This book is a treatise on the theory of ethics, very popular during the Renaissance. The first line of Lorem Ipsum, "Lorem ipsum dolor sit amet..", comes from a line in section 1.10.32.\n\n3. There are many variations of passages of Lorem Ipsum available, but the majority have suffered alteration in some form, by injected humour, or randomised words which don't look even slightly believable. If you are going to use a passage of Lorem Ipsum, you need to be sure there isn't anything embarrassing hidden in the middle of text. All the Lorem Ipsum generators on the Internet tend to repeat predefined chunks as necessary, making this the first true generator on the Internet. It uses a dictionary of over 200 Latin words, combined with a handful of model sentence structures, to generate         };
        document.getElementById('termsOfUseLink').onclick = (e) => {
            e.preventDefault();
            alert(`Условия использования\n\n1. Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since the 1500s, when an unknown printer took a galley of type and scrambled it to make a type specimen book. It has survived not only five centuries, but also the leap into electronic typesetting, remaining essentially unchanged. It was popularised in the 1960s with the release of Letraset sheets containing Lorem Ipsum passages, and more recently with desktop publishing software like Aldus PageMaker including versions of Lorem Ipsum.\n\n2. Contrary to popular belief, Lorem Ipsum is not simply random text. It has roots in a piece of classical Latin literature from 45 BC, making it over 2000 years old. Richard McClintock, a Latin professor at Hampden-Sydney College in Virginia, looked up one of the more obscure Latin words, consectetur, from a Lorem Ipsum passage, and going through the cites of the word in classical literature, discovered the undoubtable source. Lorem Ipsum comes from sections 1.10.32 and 1.10.33 of "de Finibus Bonorum et Malorum" (The Extremes of Good and Evil) by Cicero, written in 45 BC. This book is a treatise on the theory of ethics, very popular during the Renaissance. The first line of Lorem Ipsum, "Lorem ipsum dolor sit amet..", comes from a line in section 1.10.32.\n\n3. There are many variations of passages of Lorem Ipsum available, but the majority have suffered alteration in some form, by injected humour, or randomised words which don't look even slightly believable. If you are going to use a passage of Lorem Ipsum, you need to be sure there isn't anything embarrassing hidden in the middle of text. All the Lorem Ipsum generators on the Internet tend to repeat predefined chunks as necessary, making this the first true generator on the Internet. It uses a dictionary of over 200 Latin words, combined with a handful of model sentence structures, to generate Lorem Ipsum which looks reasonable. The generated Lorem Ipsum is therefore always free from repetition, injected humour, or non-characteristic words etc.`);
        };

        // Загрузка данных
        loadClients();

        // Выход (добавим кнопку позже)
        window.addEventListener('beforeunload', () => { });
    </script>
</body>

</html>
