<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная - Мои клиенты</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="light-theme">
    <div class="theme-toggle">
        <button id="themeSwitcher" class="theme-btn">🌙 Тёмная тема</button>
    </div>

    <!-- БАГ: Кнопка переключения темы должна быть в верхнем правом углу, но будет в нижнем левом (по багу) -->

    <div class="main-container">
        <header class="main-header">
            <h1>Мои клиенты</h1>
            <div style="display: flex; gap: 15px;">
                <button id="profileBtn" class="profile-btn">👤 Профиль</button>
                <button id="logoutBtn" class="profile-btn" style="background: #dc3545;">🔚 Выйти</button>
            </div>
        </header>

        <div class="clients-controls">
            <button id="createClientBtn" class="btn-primary">+ Создать клиента</button>
        </div>

        <div class="error-message" id="errorMessage" style="display: none;"></div>

        <div class="clients-table-container">
            <table class="clients-table" id="clientsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Email</th>
                        <th>Телефон</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="clientsTableBody">
                    <tr>
                        <td colspan="6" class="loading">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-left">
            © My Own Project, 2026
        </div>
        <div class="footer-right">
            <a href="#" id="privacyPolicyLink" class="footer-link">Политика конфиденциальности</a>
            <a href="#" id="termsOfUseLink" class="footer-link">Условия использования</a>
            <div class="contacts">
                Тел.: 84952223???<br>
                Эл. почта: unexistingtestmail@ya.ru
            </div>
        </div>
    </footer>

    <!-- Модальное окно для деталей клиента -->
    <div id="clientModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Информация о клиенте</h3>
                <span class="close">&times;</span>
            </div>
            <div id="clientDetails"></div>
        </div>
    </div>

    <!-- Модальное окно подтверждения удаления -->
    <div id="deleteModal" class="modal" style="display: none;">
        <div class="modal-content">
            <p>Вы действительно хотите удалить клиента?</p>
            <div class="modal-buttons">
                <button id="confirmDeleteBtn" class="btn-danger">Да</button>
                <button id="cancelDeleteBtn" class="btn-secondary">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        // Загрузка сохранённой темы
        const savedTheme = localStorage.getItem('theme');
        let isDark = savedTheme === 'dark';

        if (isDark) {
            document.body.classList.add('dark-theme');
            document.body.classList.remove('light-theme');
        } else {
            document.body.classList.add('light-theme');
            document.body.classList.remove('dark-theme');
        }

        // Обновляем текст кнопки
        const themeSwitcher = document.getElementById('themeSwitcher');
        if (themeSwitcher) {
            themeSwitcher.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
        }

        const API_BASE = window.location.origin;
        let currentUserId = null;
        let clientsList = [];
        let clientToDelete = null;

        // Проверка авторизации
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = '/';
        }

        themeSwitcher.addEventListener('click', () => {
            isDark = !isDark;
            document.body.className = isDark ? 'dark-theme' : 'light-theme';
            themeSwitcher.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Функция для защиты от XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Загрузка списка клиентов
        async function loadClients() {
            try {
                const token = localStorage.getItem('access_token');
                console.log("Token exists:", !!token);

                const response = await fetch(`${API_BASE}/clients`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                console.log("Response status:", response.status);

                if (!response.ok) {
                    if (response.status === 401 || response.status === 422) {
                        console.error("Auth error, redirecting to login");
                        localStorage.removeItem('access_token');
                        window.location.href = '/';
                        return;
                    }
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                console.log("Response data:", data);

                if (data.success && Array.isArray(data.data)) {
                    const clients = data.data;
                    const tbody = document.getElementById('clientsTableBody');

                    if (clients.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="loading">✨ Нет клиентов. Создайте первого!</td></tr>';
                        return;
                    }

                    tbody.innerHTML = clients.map(client => `
                    <tr>
                        <td>${client.client_id}</td>
                        <td>${escapeHtml(client.client_name)}</td>
                        <td>${escapeHtml(client.email)}</td>
                        <td>${escapeHtml(client.phone)}</td>
                        <td>${client.status || 'Не указан'}</td>
                        <td>
                            <button class="btn-edit" data-id="${client.client_id}">✏️</button>
                            <button class="btn-delete" data-id="${client.client_id}">🗑️</button>
                        </td>
                    </tr>
                `).join('');

                    // Добавляем обработчики на кнопки
                    document.querySelectorAll('.btn-edit').forEach(btn => {
                        btn.addEventListener('click', () => editClient(btn.dataset.id));
                    });
                    document.querySelectorAll('.btn-delete').forEach(btn => {
                        btn.addEventListener('click', () => deleteClient(btn.dataset.id));
                    });
                } else {
                    console.error("Unexpected response format:", data);
                    throw new Error(data.message || 'Ошибка загрузки');
                }
            } catch (err) {
                console.error('Error loading clients:', err);
                const tbody = document.getElementById('clientsTableBody');
                tbody.innerHTML = `<tr><td colspan="6" class="loading">❌ Ошибка загрузки: ${err.message}</td></tr>`;
            }
        }

        // Редактирование клиента
        function editClient(id) {
            window.location.href = `/edit_client_page/${id}`;
        }

        // Удаление клиента
        function deleteClient(id) {
            console.log('Delete client:', id);
            clientToDelete = id;
            const deleteModal = document.getElementById('deleteModal');
            if (deleteModal) {
                deleteModal.style.display = 'block';
            }
        }

        // Профиль
        document.getElementById('profileBtn').addEventListener('click', () => {
            window.location.href = '/profile_page';
        });

        // Создать клиента
        document.getElementById('createClientBtn').addEventListener('click', () => {
            window.location.href = '/create_client_page';
        });

        // Модальные окна
        const modal = document.getElementById('clientModal');
        const deleteModal = document.getElementById('deleteModal');
        const closeBtns = document.querySelectorAll('.close');

        closeBtns.forEach(btn => {
            btn.onclick = () => {
                if (modal) modal.style.display = 'none';
                if (deleteModal) deleteModal.style.display = 'none';
            };
        });

        window.onclick = (e) => {
            if (e.target === modal && modal) modal.style.display = 'none';
            if (e.target === deleteModal && deleteModal) deleteModal.style.display = 'none';
        };

        // Подтверждение удаления
        document.getElementById('confirmDeleteBtn')?.addEventListener('click', async () => {
            if (clientToDelete) {
                try {
                    const token = localStorage.getItem('access_token');
                    const response = await fetch(`${API_BASE}/clients/${clientToDelete}/`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (response.ok) {
                        loadClients();
                    } else {
                        alert('Ошибка при удалении');
                    }
                } catch (err) {
                    console.error('Delete error:', err);
                    alert('Ошибка сети');
                }
            }
            deleteModal.style.display = 'none';
            clientToDelete = null;
        });

        document.getElementById('cancelDeleteBtn')?.addEventListener('click', () => {
            deleteModal.style.display = 'none';
            clientToDelete = null;
        });

        // БАГ: При нажатии на Политику конфиденциальности текст в нечитабельном виде
        document.getElementById('privacyPolicyLink').onclick = (e) => {
            e.preventDefault();
            // БАГ: текст в нечитабельном виде - кракозябры
            const garbledText = "ÐŸÐ¾Ð»Ð¸Ñ‚Ð¸ÐºÐ° ÐºÐ¾Ð½Ñ„Ð¸Ð´ÐµÐ½Ñ†Ð¸Ð°Ð»ÑŒÐ½Ð¾ÑÑ‚Ð¸\n\n1. Lorem Ipsum is simply dummy text of the printing and typesetting industry...";
            alert(garbledText);
        };

        document.getElementById('termsOfUseLink').onclick = (e) => {
            e.preventDefault();
            alert(`Условия использования\n\n1. Lorem Ipsum...`);
        };

        // Загрузка данных
        loadClients();

        // Выход
        window.addEventListener('beforeunload', () => { });

        // Кнопка выхода
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                const token = localStorage.getItem('access_token');
                await fetch(`${API_BASE}/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            } catch (err) {
                // Игнорируем ошибки сети при выходе
            }

            localStorage.removeItem('access_token');
            localStorage.removeItem('user');
            window.location.href = '/';
        });

    </script>
</body>

</html>
