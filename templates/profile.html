<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="light-theme">
    <div class="theme-toggle">
        <button id="themeSwitcher" class="theme-btn">🌙 Тёмная тема</button>
    </div>

    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h1>Профиль</h1>
                <button class="close-btn" onclick="window.location.href='/clients_page'">&times;</button>
            </div>

            <div class="error-message" id="errorMessage" style="display: none;"></div>
            <div class="success-message" id="successMessage" style="display: none;"></div>

            <form id="profileForm">
                <div class="form-group">
                    <label for="name">Имя *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="surname">Фамилия *</label>
                    <input type="text" id="surname" name="surname" required>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Телефон *</label>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <span class="phone-prefix"
                            style="background: #f0f0f0; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">+7</span>
                        <input type="tel" id="phone" name="phone" placeholder="(XXX) XXX-XX-XX" required
                            style="flex: 1;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="birth_date">Дата рождения</label>
                    <input type="date" id="birth_date" name="birth_date">
                </div>

                <div class="form-group">
                    <label for="department">Подразделение</label>
                    <select id="department" name="department">
                        <option value="">Не выбрано</option>
                        <option value="Администрация">Администрация</option>
                        <option value="Бухгалтерия">Бухгалтерия</option>
                        <option value="АХО">АХО</option>
                        <option value="Закупки">Закупки</option>
                        <option value="Продажи">Продажи</option>
                        <option value="Производство">Производство</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Сохранить</button>
                    <button type="button" id="cancelBtn" class="btn-secondary">Отмена</button>
                </div>
            </form>

        </div>
    </div>

    <footer class="footer">
        <div class="footer-left">
            © My Own Project, 2026
        </div>
        <div class="footer-right">
            <a href="#" id="privacyPolicyLink" class="footer-link">Политика конфиденциальности</a>
            <a href="#" id="termsOfUseLink" class="footer-link">Условия использования</a>
            <div class="contacts">
                Тел.: 84952223???<br>
                Эл. почта: unexistingtestmail@ya.ru
            </div>
        </div>
    </footer>

    <script>
        // Загрузка сохранённой темы
        const savedTheme = localStorage.getItem('theme');
        let isDark = savedTheme === 'dark';

        if (isDark) {
            document.body.classList.add('dark-theme');
            document.body.classList.remove('light-theme');
        } else {
            document.body.classList.add('light-theme');
            document.body.classList.remove('dark-theme');
        }

        // Обновляем текст кнопки
        const themeSwitcher = document.getElementById('themeSwitcher');
        if (themeSwitcher) {
            themeSwitcher.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
        }

        const API_BASE = window.location.origin;
        let userData = null;

        // Проверка авторизации
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = '/';
        }

        themeSwitcher.addEventListener('click', () => {
            isDark = !isDark;
            document.body.className = isDark ? 'dark-theme' : 'light-theme';
            themeSwitcher.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');  // ← ДОБАВИТЬ ЭТУ СТРОКУ
        });

        // Загрузка данных пользователя
        async function loadUserProfile() {
            try {
                const token = localStorage.getItem('access_token');
                console.log("Loading profile, token exists:", !!token);

                const response = await fetch(`${API_BASE}/update_profile`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                console.log("Profile response status:", response.status);

                if (!response.ok) {
                    if (response.status === 401 || response.status === 422) {
                        localStorage.removeItem('access_token');
                        window.location.href = '/';
                        return;
                    }
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                console.log("Profile data:", data);

                if (data.success && data.data) {
                    userData = data.data;
                    fillForm(userData);
                    localStorage.setItem('user', JSON.stringify(userData));
                }
            } catch (err) {
                console.error('Error loading profile:', err);
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = 'Ошибка загрузки профиля: ' + err.message;
                errorDiv.style.display = 'block';
            }
        }

        function fillForm(user) {
            document.getElementById('name').value = user.name || '';
            document.getElementById('surname').value = user.surname || '';
            document.getElementById('email').value = user.email || '';

            // Форматируем телефон при загрузке
            let phoneValue = user.phone || '';
            let formatted = '';
            for (let i = 0; i < phoneValue.length; i++) {
                if (i === 0) formatted += '(';
                formatted += phoneValue[i];
                if (i === 2) formatted += ') ';
                if (i === 5) formatted += '-';
                if (i === 7) formatted += '-';
            }
            document.getElementById('phone').value = formatted;

            document.getElementById('birth_date').value = user.birth_date || '';
            document.getElementById('department').value = user.department || '';
        }

        // Сохранение профиля
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const surname = document.getElementById('surname').value.trim();
            const email = document.getElementById('email').value.trim();
            let phone = document.getElementById('phone').value.replace(/\D/g, '');
            const birth_date = document.getElementById('birth_date').value;
            const department = document.getElementById('department').value;

            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Простая валидация
            if (!name || name.length < 2) {
                errorDiv.textContent = 'Имя должно содержать минимум 2 символа';
                errorDiv.style.display = 'block';
                return;
            }

            if (!surname || surname.length < 1) {
                errorDiv.textContent = 'Фамилия должна содержать минимум 1 символ';
                errorDiv.style.display = 'block';
                return;
            }

            const updateData = { name, surname, email, phone };
            if (birth_date) updateData.birth_date = birth_date;
            if (department) updateData.department = department;

            try {
                const token = localStorage.getItem('access_token');
                console.log("Updating profile...");

                const response = await fetch(`${API_BASE}/update_profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(updateData)
                });

                console.log("Update response status:", response.status);

                if (!response.ok) {
                    if (response.status === 401 || response.status === 422) {
                        localStorage.removeItem('access_token');
                        window.location.href = '/';
                        return;
                    }
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    if (data.data) {
                        localStorage.setItem('user', JSON.stringify(data.data));
                    }
                    // Показываем сообщение и через секунду закрываем
                    successDiv.textContent = 'Профиль успешно обновлён!';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/clients_page';
                    }, 1000);
                } else {
                    errorDiv.textContent = data.message || 'Ошибка обновления';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error('Update error:', err);
                errorDiv.textContent = 'Ошибка сети: ' + err.message;
                errorDiv.style.display = 'block';
            }
        });

        // Отмена
        document.getElementById('cancelBtn').addEventListener('click', () => {
            window.location.href = '/clients_page';
        });

        // Футер ссылки
        document.getElementById('privacyPolicyLink').onclick = (e) => {
            e.preventDefault();
            // БАГ: нечитабельный текст
            const garbled = "ÐŸÐ¾Ð»Ð¸Ñ‚Ð¸ÐºÐ° ÐºÐ¾Ð½Ñ„Ð¸Ð´ÐµÐ½Ñ†Ð¸Ð°Ð»ÑŒÐ½Ð¾ÑÑ‚Ð¸";
            alert(garbled);
        };

        document.getElementById('termsOfUseLink').onclick = (e) => {
            e.preventDefault();
            alert(`Условия использования\n\n1. Lorem Ipsum...`);
        };

        // Форматирование телефона (маска ввода) с фиксированным +7
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 10) value = value.slice(0, 10);

            let formatted = '';
            for (let i = 0; i < value.length; i++) {
                if (i === 0) formatted += '(';
                formatted += value[i];
                if (i === 2) formatted += ') ';
                if (i === 5) formatted += '-';
                if (i === 7) formatted += '-';
            }
            e.target.value = formatted;
        });

        // Загрузка
        loadUserProfile();
    </script>
</body>

</html>
