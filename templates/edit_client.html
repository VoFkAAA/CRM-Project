<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование клиента</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="light-theme">
    <div class="theme-toggle">
        <button id="themeSwitcher" class="theme-btn">🌙 Тёмная тема</button>
    </div>

    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h1>Редактирование клиента</h1>
                <button class="close-btn" onclick="window.location.href='/clients_page'">&times;</button>
            </div>

            <div class="error-message" id="errorMessage" style="display: none;"></div>
            <div class="success-message" id="successMessage" style="display: none;"></div>

            <form id="editClientForm">
                <div class="form-group">
                    <label for="client_name">Клиент *</label>
                    <!-- БАГ: поле "Клиент" исполняет введённые теги (XSS) -->
                    <input type="text" id="client_name" name="client_name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Телефон *</label>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <span class="phone-prefix"
                            style="background: #f0f0f0; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">+7</span>
                        <input type="tel" id="phone" name="phone" placeholder="(XXX) XXX-XX-XX" required
                            style="flex: 1;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Адрес</label>
                    <input type="text" id="address" name="address">
                </div>

                <div class="form-group">
                    <label for="status">Статус</label>
                    <select id="status" name="status">
                        <option value="" disabled>— Выберите статус —</option>
                        <option value="Active">Active - активное сотрудничество</option>
                        <option value="Stopped">Stopped - сотрудничество закончено</option>
                        <option value="Blocked">Blocked - клиент заблокирован</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Сохранить</button>
                    <!-- БАГ: кнопка "Отмена" того же цвета, что и фон (текст не виден) -->
                    <button type="button" id="cancelBtn" class="btn-secondary" style="color: #6c757d;">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-left">© My Own Project, 2026</div>
        <div class="footer-right">
            <a href="#" id="privacyPolicyLink" class="footer-link">Политика конфиденциальности</a>
            <a href="#" id="termsOfUseLink" class="footer-link">Условия использования</a>
            <div class="contacts">Тел.: 84952223???<br>Эл. почта: unexistingtestmail@ya.ru</div>
        </div>
    </footer>

    <script>
        // Загрузка сохранённой темы
        const savedTheme = localStorage.getItem('theme');
        let isDark = savedTheme === 'dark';
        if (isDark) {
            document.body.classList.add('dark-theme');
            document.body.classList.remove('light-theme');
        } else {
            document.body.classList.add('light-theme');
            document.body.classList.remove('dark-theme');
        }

        const themeSwitcher = document.getElementById('themeSwitcher');
        if (themeSwitcher) {
            themeSwitcher.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
        }

        themeSwitcher.addEventListener('click', () => {
            isDark = !isDark;
            document.body.className = isDark ? 'dark-theme' : 'light-theme';
            themeSwitcher.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        const API_BASE = window.location.origin;
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/';

        // Получаем ID клиента из URL
        const clientId = window.location.pathname.split('/')[2];

        // Маска телефона
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 10) value = value.slice(0, 10);
            let formatted = '';
            for (let i = 0; i < value.length; i++) {
                if (i === 0) formatted += '(';
                formatted += value[i];
                if (i === 2) formatted += ') ';
                if (i === 5) formatted += '-';
                if (i === 7) formatted += '-';
            }
            e.target.value = formatted;
        });

        // Загрузка данных клиента
        async function loadClient() {
            try {
                const response = await fetch(`${API_BASE}/clients/${clientId}/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Ошибка загрузки');
                const client = await response.json();

                // БАГ: не экранируем теги — исполняются введённые теги (XSS)
                document.getElementById('client_name').value = client.client_name || '';
                document.getElementById('email').value = client.email || '';

                // Форматируем телефон
                let phoneValue = client.phone || '';
                let formatted = '';
                for (let i = 0; i < phoneValue.length; i++) {
                    if (i === 0) formatted += '(';
                    formatted += phoneValue[i];
                    if (i === 2) formatted += ') ';
                    if (i === 5) formatted += '-';
                    if (i === 7) formatted += '-';
                }
                document.getElementById('phone').value = formatted;
                document.getElementById('address').value = client.address || '';
                document.getElementById('status').value = client.status || '';
            } catch (err) {
                document.getElementById('errorMessage').textContent = err.message;
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        // Сохранение изменений (БАГ: можно сохранить без телефона — убрана валидация)
        document.getElementById('editClientForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const client_name = document.getElementById('client_name').value.trim();
            const email = document.getElementById('email').value.trim();
            let phone = document.getElementById('phone').value.replace(/\D/g, '');
            const address = document.getElementById('address').value;
            const status = document.getElementById('status').value;

            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Валидация для поля "Клиент"
            if (!client_name || client_name.length < 4) {
                errorDiv.textContent = 'Название клиента должно содержать минимум 4 символа';
                errorDiv.style.display = 'block';
                return;
            }
            if (client_name.length > 150) {
                errorDiv.textContent = 'Название клиента должно содержать максимум 150 символов';
                errorDiv.style.display = 'block';
                return;
            }
            // Все символы разрешены — никаких дополнительных проверок

            // БАГ: пропущена валидация телефона — можно сохранить пустой или короткий
            // if (phone.length !== 10) { errorDiv.textContent = 'Введите корректный телефон (10 цифр)'; return; }

            try {
                const response = await fetch(`${API_BASE}/clients/${clientId}/`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ client_name, email, phone, address, status })
                });

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = 'Клиент успешно обновлён!';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/clients_page';
                    }, 1000);
                } else {
                    errorDiv.textContent = data.message || 'Ошибка обновления';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Ошибка сети';
                errorDiv.style.display = 'block';
            }
        });

        // БАГ: кнопка Отмена того же цвета, что и фон (уже добавлен inline style)
        document.getElementById('cancelBtn').addEventListener('click', () => {
            window.location.href = '/clients_page';
        });

        loadClient();
    </script>
</body>

</html>
