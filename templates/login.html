<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="light-theme">
    <div class="theme-toggle">
        <button id="themeSwitcher" class="theme-btn">🌙 Тёмная тема</button>
    </div>

    <div class="container">
        <div class="form-container">
            <h1>Авторизация</h1>

            <div class="error-message" id="errorMessage" style="display: none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="login">Логин *</label>
                    <input type="text" id="login" name="login" placeholder="Введите Email или телефон" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль *</label>
                    <input type="password" id="password" name="password" placeholder="Введите пароль" required>
                </div>

                <div class="forgot-password">
                    <button type="button" id="forgotPasswordBtn" class="link-btn">Забыли логин/пароль?</button>
                </div>

                <button type="submit" class="btn-primary">Войти</button>

                <div class="register-link">
                    <span>Еще не зарегистрированы?</span>
                    <button type="button" id="registerBtn" class="link-btn">Зарегистрироваться!</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно для забытого пароля -->
    <div id="forgotModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p>Свяжитесь с администратором по телефону <span class="copyable"
                    data-copy="+79001112233">+79001112233</span> или по эл. почте <span class="copyable"
                    data-copy="admin@ya.ru">admin@ya.ru</span></p>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-left">
            © My Own Project, 2026
        </div>
        <div class="footer-right">
            <a href="#" id="privacyPolicyLink" class="footer-link">Политика конфиденциальности</a>
            <a href="#" id="termsOfUseLink" class="footer-link">Условия использования</a>
            <div class="contacts">
                Тел.: 84952223???<br>
                Эл. почта: unexistingtestmail@ya.ru
            </div>
        </div>
    </footer>

    <script>
        const API_BASE = '';

        // Переключение темы
        const themeSwitcher = document.getElementById('themeSwitcher');
        let isDark = false;

        themeSwitcher.addEventListener('click', () => {
            isDark = !isDark;
            document.body.className = isDark ? 'dark-theme' : 'light-theme';
            themeSwitcher.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
        });

        // БАГ: Кнопка переключения темы в нижнем левом углу (должна быть в верхнем)
        // Временно оставим как есть, потом перенесём в баг

        // Форма логина
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;

            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/clients_page';
                } else {
                    errorDiv.textContent = data.message || 'Ошибка авторизации';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Ошибка сети';
                errorDiv.style.display = 'block';
            }
        });

        // Кнопка "Зарегистрироваться"
        document.getElementById('registerBtn').addEventListener('click', () => {
            window.location.href = '/register_page';
        });

        // Модальное окно "Забыли пароль?"
        const modal = document.getElementById('forgotModal');
        const forgotBtn = document.getElementById('forgotPasswordBtn');
        const closeBtn = document.querySelector('.close');

        forgotBtn.onclick = () => modal.style.display = 'block';
        closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

        // Кликабельные копируемые элементы
        document.querySelectorAll('.copyable').forEach(el => {
            el.style.cursor = 'pointer';
            el.style.textDecoration = 'underline';
            el.onclick = () => {
                navigator.clipboard.writeText(el.dataset.copy);
                alert('Скопировано: ' + el.dataset.copy);
            };
        });

        // Футер ссылки
        document.getElementById('privacyPolicyLink').onclick = (e) => {
            e.preventDefault();
            alert('Политика конфиденциальности\n\nLorem Ipsum...');
        };
        document.getElementById('termsOfUseLink').onclick = (e) => {
            e.preventDefault();
            alert('Условия использования\n\nLorem Ipsum...');
        };
    </script>
</body>

</html>
